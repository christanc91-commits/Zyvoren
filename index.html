<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Merci - Zyvoren</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #e6f1ff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(120deg,#020c1b,#0a192f,#112240);
}

/* BOX */
.box {
    background: rgba(17,34,64,0.85);
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    max-width: 500px;
}

/* TITRE */
h1 {
    margin-bottom: 15px;
}

/* TEXTE */
p {
    opacity: 0.8;
}

/* BOUTON */
a {
    display: inline-block;
    margin-top: 25px;
    padding: 12px 20px;
    background: linear-gradient(45deg,#00c6ff,#1d4ed8);
    color: white;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.3s;
}

a:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="box">
    <h1>Merci 🙌</h1>
    <p>Votre message a bien été envoyé.</p>
    <p>Nous vous répondrons rapidement.</p>

    <a href="index.html">Retour à l'accueil</a>
</div>

</body>
</html>
