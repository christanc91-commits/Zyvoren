<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyvoren - Avis Clients</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#020c1b;
    color:#e6f1ff;
}

/* NAV */
nav {
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
    background:rgba(2,12,27,0.85);
    padding:15px;
}

nav a {
    color:#64ffda;
    text-decoration:none;
}

/* SECTION */
.section {
    padding:120px 20px;
    text-align:center;
}

/* CARTES */
.reviews {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    max-width:1000px;
    margin:auto;
}

.card {
    background:rgba(17,34,64,0.85);
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,198,255,0.2);
    transition:0.4s;
}

.card:hover {
    transform:translateY(-10px) scale(1.03);
    box-shadow:0 20px 40px rgba(0,198,255,0.4);
}

/* ÉTOILES */
.stars {
    color:#00c6ff;
    font-size:18px;
    margin-bottom:10px;
}

/* ANIMATION */
.reveal {
    opacity:0;
    transform:translateY(40px);
    transition:0.8s;
}

.reveal.active {
    opacity:1;
    transform:translateY(0);
}
</style>
</head>

<body>

<nav>
    <a href="index.html">Accueil</a>
    <a href="index.html#produits">Produits</a>
    <a href="about.html">À propos</a>
    <a href="contact.html">Contact</a>
    <a href="avis.html">Avis</a>
</nav>

<div class="section">
    <h1>Avis Clients</h1>

    <div class="reviews">

        <div class="card reveal">
            <div class="stars">★★★★★</div>
            <p>Incroyable qualité, je vois parfaitement sous l’eau !</p>
            <strong>- Lucas</strong>
        </div>

        <div class="card reveal">
            <div class="stars">★★★★★</div>
            <p>Design premium et très confortable, je recommande.</p>
            <strong>- Emma</strong>
        </div>

        <div class="card reveal">
            <div class="stars">★★★★☆</div>
            <p>Très bon produit, livraison rapide.</p>
            <strong>- Hugo</strong>
        </div>

    </div>
</div>

<script>
const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting) e.target.classList.add("active");
    });
});

document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));
</script>

</body>
</html>
