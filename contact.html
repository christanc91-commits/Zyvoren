<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Zyvoren</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #e6f1ff;
    background: linear-gradient(120deg,#020c1b,#0a192f,#112240);
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
    background: rgba(2,12,27,0.85);
    backdrop-filter: blur(10px);
    padding: 15px;
}

nav a {
    color: #64ffda;
    text-decoration: none;
    font-weight: bold;
}

/* CONTAINER */
.container {
    margin-top: 120px;
    display: flex;
    justify-content: center;
    padding: 20px;
}

/* BOX */
.contact-box {
    max-width: 600px;
    width: 100%;
    background: rgba(17,34,64,0.85);
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.8s ease;
}

/* INPUTS */
input, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* FOCUS STYLE 🔥 */
input:focus, textarea:focus {
    box-shadow: 0 0 10px #00c6ff;
}

/* BUTTON */
button {
    padding: 12px;
    border: none;
    background: linear-gradient(45deg,#00c6ff,#1d4ed8);
    color: white;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* TITRE */
h1 {
    margin-bottom: 20px;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Accueil</a>
<a href="about.html">À propos</a>
<a href="contact.html">Contact</a>
</nav>

<div class="container">
    <div class="contact-box">

        <h1 id="contactTitle"></h1>

        <form style="display:flex;flex-direction:column;gap:15px;margin-top:20px;">
            <input type="text" placeholder="Nom">
            <input type="email" placeholder="Email">
            <textarea placeholder="Message"></textarea>
            <button type="submit">Envoyer</button>
        </form>

    </div>
</div>

<script>
// ✨ APPARITION SMOOTH
const box = document.querySelector('.contact-box');

window.addEventListener('load', () => {
    setTimeout(() => {
        box.style.opacity = 1;
        box.style.transform = "translateY(0)";
    }, 300);
});

// ✨ LETTRE PAR LETTRE
const text = "Contactez-nous";
const el = document.getElementById("contactTitle");

let i = 0;

function typeEffect() {
    if (i < text.length) {
        el.innerHTML += text.charAt(i) === " " ? "&nbsp;" : text.charAt(i);
        i++;
        setTimeout(typeEffect, 50);
    }
}

typeEffect();
</script>

</body>
</html>
