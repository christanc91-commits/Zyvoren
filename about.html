<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyvoren - À propos</title>

<style>
body {
    margin:0;
    font-family:Arial;
    color:#e6f1ff;
    background:linear-gradient(120deg,#020c1b,#0a192f,#112240);
}

/* NAV */
nav {
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
    background:rgba(2,12,27,0.85);
    padding:15px;
}

nav a {
    color:#64ffda;
    text-decoration:none;
}

/* SECTION */
.section {
    padding:120px 20px;
    max-width:800px;
    margin:auto;
    text-align:center;
}

/* CARD */
.card {
    background:rgba(17,34,64,0.85);
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,198,255,0.2);
}

/* TEXTE ANIMÉ FIX */
.reveal-text span {
    display:inline-block;
    white-space:pre;
}

/* ANIMATION */
.reveal {
    opacity:0;
    transform:translateY(40px);
    transition:0.8s;
}

.reveal.active {
    opacity:1;
    transform:translateY(0);
}
</style>
</head>

<body>

<nav>
    <a href="index.html">Accueil</a>
    <a href="index.html#produits">Produits</a>
    <a href="about.html">À propos</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="section">

<div class="card reveal">
    <h1 class="reveal-text">À propos de Zyvoren</h1>

    <p>
    Zyvoren est une marque spécialisée dans les lunettes de piscine premium,
    alliant design moderne, confort et performance.
    </p>

    <p>
    Notre mission est d’offrir une expérience unique dans l’eau,
    avec des produits élégants et innovants.
    </p>
</div>

</div>

<script>
// TEXTE LETTRE PAR LETTRE (FIX ESPACES)
const texts = document.querySelectorAll('.reveal-text');

texts.forEach(el => {
    const content = el.innerText;
    el.innerHTML = "";

    content.split("").forEach((letter, i)=>{
        const span = document.createElement("span");
        span.innerHTML = letter === " " ? "&nbsp;" : letter;
        span.style.opacity = 0;
        el.appendChild(span);

        setTimeout(()=>{
            span.style.opacity = 1;
        }, i * 30);
    });
});

// SCROLL
const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting) e.target.classList.add("active");
    });
});
obs.observe(document.querySelector(".reveal"));
</script>

</body>
</html>
