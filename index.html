<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyvoren</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#020c1b;
    color:#e6f1ff;
}

/* NAV */
nav {
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
    background:rgba(2,12,27,0.8);
    padding:15px;
}

nav a {
    color:#64ffda;
    text-decoration:none;
}

/* SECTION */
.section {
    padding:120px 20px;
    text-align:center;
}

/* PRODUITS */
.products {
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

/* CARTE */
.product {
    background:rgba(17,34,64,0.85);
    padding:20px;
    border-radius:15px;
    width:250px;
    transition:0.4s;
}

/* HOVER CINÉMA */
.product:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 20px 50px rgba(0,198,255,0.3);
}

/* IMAGE */
.product img {
    width:100%;
    border-radius:10px;
    transition:0.6s;
}

.product:hover img {
    transform: scale(1.1) skewX(2deg);
    filter: brightness(1.2);
}

/* TEXTE ANIMÉ */
.reveal-text span {
    opacity:0;
    display:inline-block;
}

/* BOUTON */
button {
    background:linear-gradient(90deg,#1d4ed8,#00c6ff);
    border:none;
    padding:10px;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover {
    box-shadow:0 0 15px rgba(0,198,255,0.6);
}
</style>
</head>

<body>

<nav>
    <a href="#">Accueil</a>
    <a href="#produits">Produits</a>
    <a href="about.html">À propos</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="section">
    <h1 class="reveal-text">Bienvenue  chez  Zyvoren</h1>
</div>

<div id="produits" class="section">
    <h2 class="reveal-text">Nos    lunettes    premium</h2>

    <div class="products">

        <div class="product">
            <img src="https://via.placeholder.com/250" alt="">
            <h3>Lunettes Pro</h3>
            <p>Design hydrodynamique</p>
            <button>Acheter</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/250" alt="">
            <h3>Lunettes Elite</h3>
            <p>Vision ultra claire</p>
            <button>Acheter</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/250" alt="">
            <h3>Lunettes X</h3>
            <p>Performance maximale</p>
            <button>Acheter</button>
        </div>

    </div>
</div>

<script>
// 🎬 TEXTE LETTRE PAR LETTRE
const texts = document.querySelectorAll('.reveal-text');

texts.forEach(el => {
    const content = el.innerText;
    el.innerHTML = "";

    content.split("").forEach((letter, i)=>{
        const span = document.createElement("span");
        span.innerText = letter;
        el.appendChild(span);

        setTimeout(()=>{
            span.style.opacity = 1;
        }, i * 30);
    });
});

// 🌊 SCROLL FLUIDE
let current = 0;
let target = 0;

window.addEventListener('scroll', () => {
    target = window.scrollY;
});

function smoothScroll(){
    current += (target - current) * 0.08;
    window.scrollTo(0, current);
    requestAnimationFrame(smoothScroll);
}

smoothScroll();
</script>

</body>
</html>
