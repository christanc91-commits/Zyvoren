<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyvoren - Lunettes de Piscine</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #e6f1ff;
    overflow-x: hidden;
    background: #020c1b;
}

/* 🌊 FOND EAU RÉALISTE */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 200%;
    height: 200%;
    background:
        radial-gradient(circle at 30% 30%, rgba(0,198,255,0.15), transparent 60%),
        radial-gradient(circle at 70% 60%, rgba(29,78,216,0.2), transparent 60%),
        linear-gradient(120deg, #020c1b, #0a192f, #112240);
    animation: waterMove 25s linear infinite;
    z-index: -3;
}

/* 💎 REFLETS PISCINE */
body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 200%;
    height: 200%;
    background: repeating-radial-gradient(
        circle at 50% 50%,
        rgba(255,255,255,0.05) 0px,
        rgba(255,255,255,0.05) 2px,
        transparent 4px,
        transparent 40px
    );
    animation: causticsMove 18s linear infinite;
    opacity: 0.4;
    mix-blend-mode: overlay;
    z-index: -2;
}

@keyframes waterMove {
    0% { transform: translate(0,0); }
    50% { transform: translate(-5%, -5%); }
    100% { transform: translate(0,0); }
}

@keyframes causticsMove {
    0% { transform: translate(0,0) scale(1); }
    50% { transform: translate(-10%, -10%) scale(1.2); }
    100% { transform: translate(0,0) scale(1); }
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
    background: rgba(2,12,27,0.85);
    backdrop-filter: blur(10px);
    padding: 15px;
    z-index: 1000;
}

nav a {
    color: #64ffda;
    text-decoration: none;
    font-weight: bold;
    position: relative;
}

nav a::after {
    content: "";
    position: absolute;
    bottom: -5px;
    left: 0;
    width: 0%;
    height: 2px;
    background: #00c6ff;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

/* HEADER */
header {
    margin-top: 70px;
    text-align: center;
    padding: 20px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px;
}

.hero h1 {
    font-size: 32px;
    animation: fadeUp 1s ease forwards;
}

.hero p {
    opacity: 0;
    animation: fadeUp 1s ease forwards;
    animation-delay: 0.3s;
}

/* PRODUITS */
.products {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 80px 20px;
    flex-wrap: wrap;
}

.product {
    background: rgba(17,34,64,0.85);
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    transition: transform 0.3s, box-shadow 0.3s;
    opacity: 0;
    transform: translateY(40px);
}

.product.active {
    opacity: 1;
    transform: translateY(0);
}

.product:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 30px rgba(0,198,255,0.3);
}

button {
    padding: 12px 20px;
    margin-top: 10px;
    cursor: pointer;
    border: none;
    background: linear-gradient(45deg,#00c6ff,#1d4ed8);
    color: white;
    border-radius: 8px;
}

/* ANIM */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<nav>
<a href="index.html">Accueil</a>
<a href="index.html#produits">Produits</a>
<a href="about.html">À propos</a>
<a href="contact.html">Contact</a>
<a href="avis.html">Avis</a>
</nav>

<header>
<h1>Zyvoren</h1>
<p>Lunettes de piscine haute performance</p>
</header>

<section class="hero">
<h1>Voyez sous l'eau comme jamais auparavant</h1>
<p>Une vision claire, un confort ultime</p>
</section>

<section id="produits" class="products">

<div class="product">
<h3>Zyvoren Pro</h3>
<p>Anti-buée • Ultra confort</p>
<p><strong>14,99€</strong></p>
<a href="https://buy.stripe.com/6oU7sF0xPfS54sj5Sod7q03" target="_blank">
<button>🛒 Acheter</button>
</a>
</div>

<div class="product">
<h3>Zyvoren Elite</h3>
<p>Vision HD • Design premium</p>
<p><strong>24,99€</strong></p>
<a href="https://buy.stripe.com/14A9AN0xP7lz1g75Sod7q05" target="_blank">
<button>🛒 Acheter</button>
</a>
</div>

</section>

<footer style="text-align:center; padding:20px;">
<p>&copy; 2026 Zyvoren</p>
</footer>

<script>
const products = document.querySelectorAll('.product');

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add('active');
        }
    });
});

products.forEach(el => observer.observe(el));
</script>

</body>
</html>
